name: Playwright Tests → Allure Report → Gmail Notify

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────
      # STEP 1 — Checkout your code
      # ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # STEP 2 — Set up Node.js
      # ─────────────────────────────────────────
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─────────────────────────────────────────
      # STEP 3 — Install project dependencies
      # ─────────────────────────────────────────
      - name: 📦 Install Dependencies
        run: npm ci

      # ─────────────────────────────────────────
      # STEP 4 — Install Playwright browsers
      # ─────────────────────────────────────────
      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps

      # ─────────────────────────────────────────
      # STEP 5 — Install Allure CLI on the runner
      # ─────────────────────────────────────────
      - name: ⚙️ Install Allure CLI
        run: |
          curl -o allure.tgz -L \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ─────────────────────────────────────────
      # STEP 6 — Run Playwright tests
      # continue-on-error: true → report still
      # generates even when tests fail
      # ─────────────────────────────────────────
      - name: 🧪 Run Playwright Tests
        run: npx playwright test
        continue-on-error: true
        env:
          CI: true

      # ─────────────────────────────────────────
      # STEP 7 — Generate Allure HTML Report
      # ─────────────────────────────────────────
      - name: 📊 Generate Allure Report
        run: |
          allure generate allure-results \
            --clean \
            -o allure-report
        if: always()

      # ─────────────────────────────────────────
      # STEP 8 — Upload report as artifact
      # (downloadable from GitHub Actions tab)
      # ─────────────────────────────────────────
      - name: 💾 Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
        if: always()

      # ─────────────────────────────────────────
      # STEP 9 — Deploy to GitHub Pages
      # Public URL:
      # https://<username>.github.io/<repo>/allure-report
      # ─────────────────────────────────────────
      - name: 🚀 Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
        if: always()

      # ─────────────────────────────────────────
      # STEP 10 — Send Gmail Notification
      # One-click button opens Allure report
      # ─────────────────────────────────────────
      - name: 📧 Send Gmail Notification
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "GitHub Actions <onboarding@resend.dev>",
              "to": ["gajera.brijesh11@gmail.com"],
              "subject": "🎭 Playwright Report | ${{ github.repository }} | ${{ github.ref_name }}",
              "html": "<div style=\"font-family:Arial,sans-serif;max-width:600px;margin:auto;\"><div style=\"background:#1a1a2e;padding:24px 30px;\"><h2 style=\"color:white;margin:0;\">🎭 Playwright Test Report</h2><p style=\"color:#aaa;margin:6px 0 0 0;font-size:13px;\">GitHub Actions — Automated Notification</p></div><div style=\"padding:28px 30px;\"><table style=\"width:100%;border-collapse:collapse;font-size:14px;\"><tr style=\"border-bottom:1px solid #eee;\"><td style=\"padding:10px 0;color:#888;width:35%;\">Repository</td><td style=\"padding:10px 0;font-weight:bold;\">${{ github.repository }}</td></tr><tr style=\"border-bottom:1px solid #eee;\"><td style=\"padding:10px 0;color:#888;\">Branch</td><td style=\"padding:10px 0;font-weight:bold;\">${{ github.ref_name }}</td></tr><tr style=\"border-bottom:1px solid #eee;\"><td style=\"padding:10px 0;color:#888;\">Triggered by</td><td style=\"padding:10px 0;font-weight:bold;\">${{ github.actor }}</td></tr><tr><td style=\"padding:10px 0;color:#888;\">Run</td><td style=\"padding:10px 0;\">#${{ github.run_number }}</td></tr></table><div style=\"text-align:center;margin:36px 0 20px 0;\"><a href=\"https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report/index.html\" style=\"display:inline-block;background:linear-gradient(135deg,#4CAF50,#2196F3);color:white;padding:16px 40px;text-decoration:none;border-radius:8px;font-size:16px;font-weight:bold;\">📊 Open Allure Report</a><p style=\"font-size:12px;color:#999;margin-top:10px;\">Click to open the full interactive report in your browser</p></div></div><div style=\"background:#f8f9fa;padding:16px 30px;border-top:1px solid #eee;\"><p style=\"font-size:12px;color:#aaa;margin:0;text-align:center;\">Sent by GitHub Actions • ${{ github.repository }}</p></div></div>"
            }'
        if: always()